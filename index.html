<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <link rel="stylesheet" href="common.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .menu > .active{
            background-color: azure;
        }
        .container > div{
            display: none;
        }
        .container > div.active{
            display: initial;
        }
        .settings input{
            display: block;
        }
        .new-chat-error {
            color: red;
            margin-top: 8px;
        }
    </style>
</head>

<body class="min-h-screen bg-slate-100 text-slate-900">
        <main class="mx-auto flex min-h-screen max-w-6xl gap-4 p-4">
    <aside class="w-72 rounded-lg bg-white p-4 shadow">
        <div class="name text-lg font-bold"></div>
        <div class="email mt-1 text-sm text-slate-500"></div>
        <button class="logout-btn mt-4 w-full rounded bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-700">Log out</button>
        <div class="menu mt-6 space-y-2">
        <div class="my-chats active cursor-pointer rounded px-3 py-2 text-sm font-medium">My chats</div>
        <div class="new-chat cursor-pointer rounded px-3 py-2 text-sm font-medium hover:bg-slate-100">New chat</div>
        <div class="settings cursor-pointer rounded px-3 py-2 text-sm font-medium hover:bg-slate-100">Settings</div>


        </div>
    </aside>  
    <div class="container flex-1 rounded-lg bg-white p-4 shadow">
        <div class="my-chats active space-y-2">
        <h2 class="mb-4 text-xl font-bold">My chats</h2>
    </div>

        <div class="new-chat space-y-3">
            <h2 class="text-xl font-bold">New chat</h2>
            <input class="w-full rounded border border-slate-300 px-3 py-2 outline-none focus:border-slate-500" type="text" placeholder="User name">
            <button class="w-full rounded bg-blue-600 px-3 py-2 font-medium text-white hover:bg-blue-700">Start chat</button>
            <div class="new-chat-error text-sm text-red-600"></div>
        </div>
        <div class="chat-details text-slate-500">Select a chat to start messaging</div>
        <div class="settings space-y-3">
            <button class="change-username">Change user name</button>
            <button class="change-email">Change email</button>
            <button class="change-password">Change password</button>
            <div>
                <input type="text" placeholder="User name" autocomplete="off" class="username hidden">
                <input type="text" placeholder="Email" autocomplete="off" class="email hidden">
                <input type="password" placeholder="Password" autocomplete="off" class="password hidden">
                <input type="password" placeholder="Repeat password" autocomplete="off" class="repeat-password hidden">

                <div>
                    <button class="ok-btn hidden">Ok</button>
                    <button class="cancel-btn hidden">Cancel</button>
                </div>
                <div class="settings-error"></div>
            </div>
        </div>
    </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
